<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background radial glows -->
    <radialGradient id="glow-violet" cx="80%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="-5%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Brand text gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Brand bar gradient -->
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Base dark background -->
  <rect width="1200" height="630" fill="#0c0a1a"/>
  <rect width="1200" height="630" fill="url(#glow-violet)"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#7c3aed" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Eyebrow -->
  <text x="80" y="120"
    font-family="'JetBrains Mono', 'Menlo', 'Consolas', monospace"
    font-size="22" font-weight="600"
    fill="#a78bfa"
    letter-spacing="3">
    THE AI AGENT DIRECTORY
  </text>

  <!-- Gradient bar under eyebrow -->
  <rect x="80" y="138" width="64" height="4" fill="url(#bar-grad)" rx="2"/>

  <!-- Wordmark (My + AgentStack) -->
  <text x="80" y="260"
    font-family="'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="104" font-weight="700"
    letter-spacing="-2.5">
    <tspan fill="#f0eef8">My</tspan><tspan fill="url(#brand-grad)">AgentStack</tspan>
  </text>

  <!-- Tagline (two lines) -->
  <text x="80" y="340"
    font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="34" font-weight="400"
    fill="#c4c0d8">
    AI agents, vibecoded products, and tools
  </text>
  <text x="80" y="385"
    font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="34" font-weight="400"
    fill="#c4c0d8">
    for marketing, comms, and media.
  </text>

  <!-- Category pill row -->
  <g font-family="'JetBrains Mono', 'Menlo', monospace" font-size="18" font-weight="600">
    <!-- Comms -->
    <rect x="80" y="455" width="116" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="138" y="481" text-anchor="middle" fill="#a78bfa">COMMS</text>
    <!-- Content -->
    <rect x="208" y="455" width="132" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="274" y="481" text-anchor="middle" fill="#a78bfa">CONTENT</text>
    <!-- Social -->
    <rect x="352" y="455" width="116" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="410" y="481" text-anchor="middle" fill="#a78bfa">SOCIAL</text>
    <!-- SEO & GEO -->
    <rect x="480" y="455" width="156" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="558" y="481" text-anchor="middle" fill="#a78bfa">SEO &amp; GEO</text>
    <!-- Martech -->
    <rect x="648" y="455" width="124" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="710" y="481" text-anchor="middle" fill="#a78bfa">MARTECH</text>
    <!-- Brand -->
    <rect x="784" y="455" width="106" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="837" y="481" text-anchor="middle" fill="#a78bfa">BRAND</text>
    <!-- Media -->
    <rect x="902" y="455" width="106" height="40" rx="20" fill="#16132e" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="955" y="481" text-anchor="middle" fill="#a78bfa">MEDIA</text>
  </g>

  <!-- Robot row (rating signature) -->
  <g transform="translate(900, 540)">
    <!-- 5 robots, each 40x40 with 4px gap -->
    <g transform="translate(0,0)">
      <line x1="20" y1="3" x2="20" y2="9" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="3" r="1.8" fill="url(#brand-grad)"/>
      <rect x="7" y="9" width="26" height="22" rx="5" fill="none" stroke="url(#brand-grad)" stroke-width="2.5"/>
      <rect x="4" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <rect x="33" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <circle cx="15" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <circle cx="25" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <rect x="14" y="24.5" width="12" height="2.6" rx="1.3" fill="url(#brand-grad)"/>
    </g>
    <g transform="translate(44,0)">
      <line x1="20" y1="3" x2="20" y2="9" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="3" r="1.8" fill="url(#brand-grad)"/>
      <rect x="7" y="9" width="26" height="22" rx="5" fill="none" stroke="url(#brand-grad)" stroke-width="2.5"/>
      <rect x="4" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <rect x="33" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <circle cx="15" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <circle cx="25" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <rect x="14" y="24.5" width="12" height="2.6" rx="1.3" fill="url(#brand-grad)"/>
    </g>
    <g transform="translate(88,0)">
      <line x1="20" y1="3" x2="20" y2="9" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="3" r="1.8" fill="url(#brand-grad)"/>
      <rect x="7" y="9" width="26" height="22" rx="5" fill="none" stroke="url(#brand-grad)" stroke-width="2.5"/>
      <rect x="4" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <rect x="33" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <circle cx="15" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <circle cx="25" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <rect x="14" y="24.5" width="12" height="2.6" rx="1.3" fill="url(#brand-grad)"/>
    </g>
    <g transform="translate(132,0)">
      <line x1="20" y1="3" x2="20" y2="9" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="3" r="1.8" fill="url(#brand-grad)"/>
      <rect x="7" y="9" width="26" height="22" rx="5" fill="none" stroke="url(#brand-grad)" stroke-width="2.5"/>
      <rect x="4" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <rect x="33" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <circle cx="15" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <circle cx="25" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <rect x="14" y="24.5" width="12" height="2.6" rx="1.3" fill="url(#brand-grad)"/>
    </g>
    <g transform="translate(176,0)">
      <line x1="20" y1="3" x2="20" y2="9" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="3" r="1.8" fill="url(#brand-grad)"/>
      <rect x="7" y="9" width="26" height="22" rx="5" fill="none" stroke="url(#brand-grad)" stroke-width="2.5"/>
      <rect x="4" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <rect x="33" y="16" width="3" height="8" rx="1.5" fill="url(#brand-grad)"/>
      <circle cx="15" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <circle cx="25" cy="18" r="2.3" fill="url(#brand-grad)"/>
      <rect x="14" y="24.5" width="12" height="2.6" rx="1.3" fill="url(#brand-grad)"/>
    </g>
  </g>

  <!-- URL footer -->
  <text x="80" y="568"
    font-family="'JetBrains Mono', 'Menlo', monospace"
    font-size="22" font-weight="500"
    fill="#7a758f"
    letter-spacing="1">
    myagentstack.io
  </text>
</svg>
